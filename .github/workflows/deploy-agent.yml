name: Deploy SRE Agent

on:
  push:
    branches: [main]
    paths:
      - 'agent.json'
      - 'config/**'
      - 'automations/**'
      - 'data/**'
      - 'connectors.json'
      - 'tool-permissions.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install SRE Agent templates
        run: |
          git clone --depth 1 https://github.com/microsoft/sre-agent.git /tmp/sre-agent
          echo "/tmp/sre-agent/sreagent-templates/bin" >> $GITHUB_PATH

      - name: Write connector secrets
        run: |
          echo "DYNATRACE_BEARER_TOKEN=${{ secrets.DYNATRACE_BEARER_TOKEN }}" > connectors.secrets.env
          echo "SERVICENOW_PASSWORD=${{ secrets.SERVICENOW_PASSWORD }}" >> connectors.secrets.env

      - name: Deploy agent
        run: |
          /tmp/sre-agent/sreagent-templates/bin/deploy.sh . --force

      - name: Verify deployment
        run: |
          SUB=$(az account show --query id -o tsv)
          /tmp/sre-agent/sreagent-templates/bin/verify-agent.sh "$SUB" "rg-demo1-dt-snow" "demo1-dt-snow"
